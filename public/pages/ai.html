<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgojoGacor — AI Chat</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .ai-chat-area { display: flex; flex-direction: column; gap: 12px; max-height: 55vh; overflow-y: auto; padding: 16px; background: var(--bg-secondary); border-radius: var(--radius); margin-bottom: 12px; }
        .ai-msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; max-width: 80%; }
        .ai-msg.user   { background: var(--accent); color: #fff; align-self: flex-end; }
        .ai-msg.bot    { background: var(--bg-card); border: 1px solid var(--border); }
        .ai-msg.loading{ color: var(--text-muted); font-style: italic; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo"><span class="logo-icon">⚔️</span><div><div class="logo-text">AlgojoGacor</div></div></div>
            <nav class="sidebar-nav">
                <a class="nav-item" href="/dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
                <a class="nav-item active" href="/pages/ai.html"><span class="nav-icon">🤖</span> AI Chat</a>
                <a class="nav-item" href="/pages/tools.html"><span class="nav-icon">🛠️</span> Tools</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar" id="sidebar-avatar">?</div><div><div class="user-name" id="sidebar-username">Loading...</div></div></div>
                <button class="btn btn-secondary btn-block btn-sm" onclick="logout()">🚪 Logout</button>
            </div>
        </aside>
        <div class="main-content">
            <header class="topbar"><div style="display:flex;align-items:center;gap:12px"><button class="hamburger" onclick="toggleSidebar()">☰</button><span class="topbar-title">🤖 AI Chat</span></div></header>
            <main class="content-area">
                <div class="card">
                    <div class="card-header"><span class="icon">🤖</span><h3>AlgojoGacor AI</h3><span style="font-size:12px;color:var(--text-muted);margin-left:auto">Powered by OpenRouter</span></div>
                    <div class="form-group">
                        <label>Model AI</label>
                        <select class="form-input" id="ai-model">
                            <option value="openai/gpt-4o-mini">GPT-4o Mini (Cepat & Hemat)</option>
                            <option value="openai/gpt-4o">GPT-4o (Paling Pintar)</option>
                            <option value="anthropic/claude-3-haiku">Claude 3 Haiku (Cepat)</option>
                            <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (Gratis)</option>
                        </select>
                    </div>
                    <div class="ai-chat-area" id="ai-chat-area">
                        <div class="ai-msg bot">👋 Halo! Saya AlgojoGacor AI. Tanyakan apa saja!</div>
                    </div>
                    <div style="display:flex;gap:8px">
                        <input type="text" class="form-input" id="ai-input" placeholder="Ketik pertanyaan..." onkeydown="if(event.key==='Enter') sendAI()">
                        <button class="btn btn-primary" onclick="sendAI()">➤ Kirim</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="/js/api.js"></script>
    <script>
        if (!requireLogin()) throw new Error();
        const ME = getUser();
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('sidebar-username').textContent = ME.username;
            document.getElementById('sidebar-avatar').textContent   = ME.username[0].toUpperCase();
        });

        async function sendAI() {
            const input  = document.getElementById('ai-input');
            const model  = document.getElementById('ai-model').value;
            const msg    = input.value.trim();
            if (!msg) return;
            input.value  = '';

            const area = document.getElementById('ai-chat-area');
            area.innerHTML += `<div class="ai-msg user">${escHtml(msg)}</div>`;
            area.innerHTML += `<div class="ai-msg loading" id="ai-loading">🤔 Memproses...</div>`;
            area.scrollTop = area.scrollHeight;

            const res = await api.post('/features/ai/chat', { message: msg, model });

            document.getElementById('ai-loading')?.remove();
            if (res?.success) {
                area.innerHTML += `<div class="ai-msg bot">${escHtml(res.reply).replace(/\n/g,'<br>')}</div>`;
            } else {
                area.innerHTML += `<div class="ai-msg bot" style="color:var(--accent)">❌ ${escHtml(res?.message || 'Error')}</div>`;
            }
            area.scrollTop = area.scrollHeight;
        }

        function escHtml(s) { return String(s||'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#x27;'}[c])); }
    </script>
</body>
</html>
